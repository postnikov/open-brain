services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: open_brain
      POSTGRES_PASSWORD: open_brain_local
      POSTGRES_DB: open_brain
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_brain"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://open_brain:open_brain_local@db:5432/open_brain
      PORT: "3100"
    env_file:
      - .env
    ports:
      - "3100:3100"
    command: >
      sh -c "node --import tsx/esm src/db/migrate.ts &&
             node --import tsx/esm src/server.ts"

volumes:
  pgdata:
